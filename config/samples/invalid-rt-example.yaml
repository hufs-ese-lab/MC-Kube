apiVersion: mcoperator.sdv.com/v1
kind: MCKube
metadata:
  name: invalid-rt-test-pod-config
  namespace: default
spec:
  podname: "invalid-rt-test-pod"
  criticality: "HIGH"
  rtSettings:
    period: 1000000     # 1 second
    budget_lo: 300000   # valid low budget
    budget_hi: 1500000  # INVALID! budget_hi > period
    core: "2-3"
---
apiVersion: v1
kind: Pod
metadata:
  name: invalid-rt-test-pod
  namespace: default
  labels:
    app: invalid-rt-test
spec:
  containers:
  - name: test-container
    image: nginx:latest