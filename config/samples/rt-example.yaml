apiVersion: mcoperator.sdv.com/v1
kind: MCKube
metadata:
  name: rt-test-pod-config
  namespace: default
spec:
  podname: "rt-test-pod"
  criticality: "HIGH"
  rtSettings:
    period: 1000000        # 1 second in microseconds
    budget_lo: 300000      # 300ms initial runtime (conservative)
    budget_hi: 500000      # 500ms elevated runtime (after overrun detection)
---
apiVersion: v1
kind: Pod
metadata:
  name: rt-test-pod
  namespace: default
  labels:
    app: rt-test
spec:
  containers:
  - name: test-container
    image: nginx:latest